[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# 호스트 로그
[INPUT]
    Name              tail
    Path              /var/log/*.log
    Exclude_Path      /var/log/btmp,/var/log/wtmp
    Tag               host.*
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /tmp/flb-host-log.db
    Mem_Buf_Limit     50MB
    Parser            syslog_multiline

# 도커 컨테이너 로그 (기본 docker json)
[INPUT]
    Name                tail
    Path                /var/lib/docker/containers/*/*.log
    Tag                 docker.*
    Refresh_Interval    5
    Skip_Long_Lines     On
    DB                  /tmp/flb-docker-log.db
    Mem_Buf_Limit       200MB
    Parser              docker
    Docker_Mode         On
    Docker_Mode_Parser  docker
    Multiline           On
    Multiline_Flush     5
    Multiline_Type      regex
    Multiline_Pattern   ^\s+at\s|^\s*Caused by:|^\s*Suppressed:|^\t...|^\s*... \d+ more$

# 공통 라벨
[FILTER]
    Name    record_modifier
    Match   *
    Record  host ${HOSTNAME}

# logback json에서 필드 추출(traceId/spanId 등)
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       logback_json
    Reserve_Data On
    Preserve_Key On

# Loki로 전송
[OUTPUT]
    Name       loki
    Match      *
    Host       loki
    Port       3100
    Line_Format json
    Labels     env=${FLB_ENV},job=$tag,host=${HOSTNAME},service=$service,container_id=$container_id,compose_service=$compose_service,traceId=$traceId
    Retry_Limit False

# 디버깅(옵션)
[OUTPUT]
    Name  stdout
    Match *
