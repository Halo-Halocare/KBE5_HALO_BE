[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

# 호스트 로그
[INPUT]
    Name              tail
    Path              /var/log/*.log
    Exclude_Path      /var/log/btmp,/var/log/wtmp
    Tag               host.*
    Refresh_Interval  5
    Skip_Long_Lines   On
    DB                /tmp/flb-host-log.db
    Mem_Buf_Limit     50MB
    Parser            syslog_multiline

# 도커 컨테이너 로그 (기본 docker json)
[INPUT]
    Name                tail
    Path                /var/lib/docker/containers/*/*.log
    Tag                 docker.*
    Refresh_Interval    5
    Skip_Long_Lines     On
    DB                  /tmp/flb-docker-log.db
    Mem_Buf_Limit       200MB
    Parser              docker
    Docker_Mode         On
    Docker_Mode_Parser  docker
    Multiline           On
    Multiline_Flush     5
    Multiline_Type      regex
    Multiline_Pattern   ^\s+at\s|^\s*Caused by:|^\s*Suppressed:|^\t...|^\s*... \d+ more$

# 공통 레코드 키: host, env (라벨에서 $host, $env로 사용)
[FILTER]
    Name    record_modifier
    Match   *
    Record  host ${HOSTNAME}
    Record  env  ${FLB_ENV}

# (docker.* 전용) Docker 메타데이터 주입 → container_id, container_name, labels...
[FILTER]
    Name          docker
    Match         docker.*
    Unix_Path     /var/run/docker.sock
    Labels        On
    Env           Off
    Include_Label com.docker.compose.service
    Include_Label service

# (docker.* 전용) 라벨 키 정리: compose_service, service 정규화
[FILTER]
    Name    modify
    Match   docker.*
    Rename  label_com_docker_compose_service  compose_service
    Rename  label_service                     service

# (docker.* 전용) service 기본값 보정: service 없으면 compose_service → container_name → "unknown"
[FILTER]
    Name   lua
    Match  docker.*
    script /fluent-bit/etc/set_service.lua
    call   ensure_labels

# (docker.* 전용) logback JSON 파싱(traceId/spanId 등 추출)
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       logback_json
    Reserve_Data On
    Preserve_Key On

[OUTPUT]
    Name        loki
    Match       docker.*
    Host        loki
    Port        3100
    Line_Format json
    Labels      env=$env,node=$host,job=$tag,service=$service,compose_service=$compose_service,container_id=$container_id,container_name=$container_name,traceId=$traceId
    Retry_Limit False

[OUTPUT]
    Name        loki
    Match       host.*
    Host        loki
    Port        3100
    Line_Format json
    Labels      env=$env,node=$host,job=$tag
    Retry_Limit False

# (옵션) 디버깅
[OUTPUT]
    Name  stdout
    Match *
