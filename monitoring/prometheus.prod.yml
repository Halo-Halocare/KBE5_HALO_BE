global: { scrape_interval: 15s }
scrape_configs:
  - job_name: 'halocare-api'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 10.0.1.194:8080   # prod-node-1
          - 10.0.11.146:8081   # prod-node-2
        labels: { env: prod, service: halocare-api }
  - job_name: 'prometheus'
    static_configs: [ { targets: ['prometheus:9090'] } ]
