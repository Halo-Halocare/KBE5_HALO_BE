version: "3.9"

services:
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - /data/prometheus:/prometheus
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /data/grafana:/var/lib/grafana

  loki:
    ports:
      - "3100:3100"
    volumes:
      - /data/loki:/loki

  tempo:
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - /data/tempo:/tmp/tempo

  otel-collector:
    ports:
      - "4317:4317"   # OTLP gRPC (0.0.0.0)
      - "127.0.0.1:4318:4318"
    # 필요하면 수집량에 따라 자원 제한/확장 고려
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #     reservations:
    #       memory: 256M

  fluent-bit:
    environment:
      - FLB_ENV=prod
    # 리더 노드의 Fluent Bit는 loki:3100(동일 호스트)로 푸시하므로 기본값 유지
    # 다른 앱 노드에서는 별도 경량 compose(또는 systemd)로 fluent-bit만 띄워 Host=<리더 프라이빗IP>로 전송
    # deploy:
    #   resources:
    #     limits:
    #       memory: 256M
    #     reservations:
    #       memory: 128M

